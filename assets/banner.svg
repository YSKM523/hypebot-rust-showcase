  <text x="132" y="124" fill="#93C5FD" font-family="Arial, sans-serif" font-size="18" letter-spacing="2">PRIVATE SOURCE · PUBLIC SHOWCASE</text>
  <text x="132" y="238" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="64" font-weight="700">hypebot-rs</text>
  <text x="132" y="521" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="24">Rust trading system for Hyperliquid with typed feeds, serialized execution, and long-running resilience.</text>
  <text x="776" y="188" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="24" font-weight="700">Runtime</text>
  <text x="776" y="226" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="18">WS heartbeat, stale detection, reconnect loop</text>
  <text x="776" y="322" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="24" font-weight="700">Execution</text>
  <text x="776" y="360" fill="#6EE7B7" font-family="Arial, sans-serif" font-size="18">Single-path order execution to reduce race conditions</text>
  <text x="776" y="450" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="24" font-weight="700">Strategy</text>
  <text x="776" y="482" fill="#C4B5FD" font-family="Arial, sans-serif" font-size="18">Breakout retest, ATR, ADX, BB width, volume filters</text>
